<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text docoration</title>  
    <style>
        .box { height:100px; width: 100px; }
        #box1 { /*text-decoration: overline;*/ background-color:rgb(219, 219, 58); text-decoration-style: dotted;}
        #box2 {/*text-decoration: underline;*/ background-color: rgb(70, 143, 143); text-decoration-style: solid;}
        #box3 { /*text-decoration: line-through;*/ background-color: rgb(36, 84, 84); text-decoration-style: wavy;}
    </style>
</head>
<body>
    <h1 id="box1" class="box"> box1</h1>
    <h1 id="box2" class="box"> box2</h1>
    <h3 id="box3" class="box"> box3</h3>
    
</body>
</html>
