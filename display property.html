<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display property</title>
    <style>
        * { margin: 0; padding: 0;}
        .dis {
      height: 50px; 
    width: 50px;
    margin: 5px;
     background-color: lightcoral;
     display: inline-block;
        }
        #box1 {
            display: none;
        }
    </style>
</head>
<body>
    
<div id="box1" class="dis"> box1</div>
<div id="box2" class="dis"> box2</div>
<div id="box3" class="dis"> box3</div>
</body>
</html>
