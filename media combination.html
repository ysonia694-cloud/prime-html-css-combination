<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media combination</title>
    <style>
        .media {
            height: 100px;
            width: 100px;
            background-color: darkorange;
        }
        @media screen and (min-width: 250px) {
            .media {
                border-radius: 50%;
            }

        }
            
        
    </style>
</head>
<body>
    <div class="media">media</div>
</body>

</html>
