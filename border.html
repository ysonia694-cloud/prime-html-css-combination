<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .heap { 
            height: 50px;
            width: 50px;
        }
        #first {

            border: 3px dashed;
            border-radius: 10px;
            margin: 5px;

            background-color: chocolate;

        }

        #second {

            border: 5px solid  red;
           margin: 10px;

            background-color: coral;
        }
    </style>
</head>
<body>
  <div id="first" class="heap" >first box</div>
  <div id="second" class="heap">second box</div>
</body>
</html>
