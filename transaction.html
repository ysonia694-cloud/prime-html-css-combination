<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transaction</title>
    <style>
        .pseudo {
            height: 25px;
            width: 150px; 
            border: 5px solid blue;
            background-color:wheat;
            border-radius: 10px;
            transition-property: all;
            transition-duration: 4s;
            transition-timing-function: ease-in-out;
            transition-delay: 0s;
        }
        .pseudo:hover {
            height: 35px;
            width: 160px;
            background-color: rgb(8, 137, 109);
        }
        .pseudo:active {
            height: 35px;
            width: 160px;
            background-color: red;
        }
    </style>
</head>
<body>
    <button class="pseudo"> learning pseudo</button>
    
</head>

</html>
