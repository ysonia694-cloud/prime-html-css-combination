<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style> 
    .heap {
        height: 200px;
        width: 200px;
        height: 200px;
        padding: 5px;
        margin: 5px;
    }
        #first {
            background-color: rgb(225, 26, 225);
        } 
        #second {
            background-color: springgreen;
        }

        #btn {
            height: 70px;
            width: 70;
            border: 5px dotted red; 
            border-radius: 35px;
            margin: 100px;
            padding: 10px 15px 10px 15px;
            background-color: rgb(10, 95, 126);
        }
    </style>
</head>
<body>
    <div id="first" class="heap" style="box-sizing: border-box;">first div</div>
    <hr>
    <button id="btn" > click me!</button>
    <hr>
    <br>
    <div id="second" class="heap" style="box-sizing: content-box;"> second div</div>
</body>
</html>
