<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style> 
        .box {
            height: 100px;
            width: 100px;
            border: 5px solid blue;
            margin: 10px;
            padding: 5px;
            background-color: deeppink ;
            position: relative;
            top: 10px;
            left: 50px;

            animation-name: rounded;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-iteration-count: 4;
            

        }
        @keyframes rounded {
            from { left:10px;}
            to { left: 200px;}
            
        }
    </style>
</head>
<body>
    <div class="box"> animation_1</div>
    <div class="box"> animation_2</div>
    <div class="box"> animation_3</div>
    <div class="box"> animation_4</div>
    
</body>
</html>
