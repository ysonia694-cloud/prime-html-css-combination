<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style> 
         
         .box {
            height: 100px;
            width: 100px;
            border: 10px solid yellow;
            margin: 10px;
            padding: 5px;
            background-color: darkslategrey;
            position: relative;
            top: 10px;
            left: 20px;

            animation: ghomker 2s ease-in-out 1s infinite alternate;


         }
         @keyframes ghomker {
            0% {left:10px;}
            50% { left: 50px;}
            60% { left:160px;}
            100% { left: 200px;}
            
         }

    </style>
</head>
<body>
    <div class="box"> animation1</div>
    <div class="box"> animation2</div>
</body>
</html>
