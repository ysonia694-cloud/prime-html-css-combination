<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-transform</title>
    <style> 
        .box { height: 200px; width: 200px; color:rgb(244, 208, 7); background-color: rgb(177, 124, 53);}
        #box1 { text-transform: capitalize;}
        #box2 {text-transform: uppercase;}
        #box3 { text-transform: lowercase;}
        #box4 { text-transform: none;}

    </style>
</head>
<body>
    <h2 id="box1" class="box"> this is my first box</h2>
    <h2 id="box2" class="box"> this is my second box</h2>
    <h2 id="box3" class="box"> this is my third box</h2>
    
    <h2 id="box4" class="box"> this is my fourth box</h2>
    
    
    
</body>
</html>
